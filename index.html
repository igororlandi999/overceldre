<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRE &mdash; Portal Financeiro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Poppins:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">

  <header>
    <div class="header-left">
      <span class="logo">DRE</span>
      <div class="logo-sep"></div>
      <span class="logo-title">Demonstrativo de Resultado do Exerc&#237;cio</span>
    </div>
    <div class="header-right" id="header-actions"></div>
  </header>

  <main>
    <div class="month-nav" id="month-nav"></div>
    <div id="dre-container"></div>
  </main>

</div>

<div id="status-bar"></div>

<div class="overlay" id="modal-login" style="display:none;">
  <div class="modal">
    <div class="modal-title">Acesso administrativo</div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input type="password" class="form-input" id="login-password" placeholder="Digite a senha de admin" />
    </div>
    <div class="form-error" id="login-error"></div>
    <div class="form-row">
      <button class="btn btn-ghost" onclick="closeModal('modal-login')">Cancelar</button>
      <button class="btn btn-accent" onclick="doLogin()">Entrar</button>
    </div>
  </div>
</div>

<div class="overlay" id="modal-config" style="display:none;">
  <div class="modal">
    <div class="modal-title">Configura&#231;&#227;o do reposit&#243;rio</div>
    <div class="form-group">
      <label class="form-label">Usu&#225;rio GitHub</label>
      <input type="text" class="form-input" id="cfg-user" placeholder="ex: seunome" />
    </div>
    <div class="form-group">
      <label class="form-label">Nome do reposit&#243;rio</label>
      <input type="text" class="form-input" id="cfg-repo" placeholder="ex: dre-portal" />
    </div>
    <div class="form-group">
      <label class="form-label">Personal Access Token (PAT)</label>
      <input type="password" class="form-input" id="cfg-pat" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
      <div class="form-help">Permiss&#227;o necess&#225;ria: Contents (read + write).<br>Armazenado apenas no seu navegador via localStorage.</div>
    </div>
    <div class="form-error" id="config-error"></div>
    <div class="form-row">
      <button class="btn btn-ghost" onclick="closeModal('modal-config')">Cancelar</button>
      <button class="btn btn-accent" onclick="saveConfig()">Salvar configura&#231;&#227;o</button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ─── CONFIG ─────────────────────────────────────────────── */
var ADMIN_PASSWORD = 'admin123';
var DASH = '\u2014';

/* ─── ESTRUTURA DA DRE ───────────────────────────────────── */
var DRE_STRUCTURE = [
  { type: 'section', label: '(+) RECEITA BRUTA' },
  { type: 'sub', key: 'vendas_diretas',  label: 'Vendas diretas' },
  { type: 'sub', key: 'marketplaces',    label: 'Marketplaces (l\u00edquido de comiss\u00e3o da plataforma)' },
  { type: 'total', id: 'receita_bruta',  label: '= RECEITA BRUTA TOTAL', color: 'positive' },

  { type: 'section', label: '(-) DEDU\u00c7\u00d5ES DA RECEITA' },
  { type: 'sub', key: 'comissoes',       label: 'Comiss\u00f5es' },
  { type: 'sub', key: 'devolucoes',      label: 'Devolu\u00e7\u00f5es' },
  { type: 'total', id: 'receita_liquida', label: '= RECEITA L\u00cdQUIDA', color: 'dynamic' },

  { type: 'section', label: '(-) CMV \u2014 CUSTO DOS PRODUTOS VENDIDOS' },
  { type: 'sub', key: 'cmv',             label: 'Custo dos produtos vendidos' },
  { type: 'total-grand', id: 'lucro_bruto', label: '= LUCRO BRUTO', color: 'dynamic', showPct: true },

  { type: 'section', label: '(-) DESPESAS OPERACIONAIS' },
  { type: 'sub', key: 'pessoal',         label: 'Pessoal (sal\u00e1rios, INSS)' },
  { type: 'sub', key: 'fixas',           label: 'Fixas (aluguel, contabilidade)' },
  { type: 'sub', key: 'administrativas', label: 'Administrativas (banc\u00e1rias, materiais)' },
  { type: 'sub', key: 'frete_venda',     label: 'Frete de venda' },
  { type: 'total-grand', id: 'ebitda',   label: '= RESULTADO OPERACIONAL (EBITDA)', color: 'dynamic', showPct: false },

  { type: 'section', label: '(-) IMPOSTOS SOBRE OPERA\u00c7\u00c3O' },
  { type: 'sub', key: 'simples',         label: 'Simples Nacional' },
  { type: 'total-grand', id: 'res_apos_imp', label: '= RESULTADO OPERACIONAL AP\u00d3S IMPOSTOS', color: 'dynamic', showPct: false },

  { type: 'section', label: '(-) RETIRADAS DE S\u00d3CIOS' },
  { type: 'sub', key: 'dividendos',      label: 'Antecipa\u00e7\u00e3o de dividendos' },
  { type: 'total-grand', id: 'res_liquido', label: '= RESULTADO L\u00cdQUIDO', color: 'dynamic', showPct: true },

  { type: 'divider' },
  { type: 'info', key: 'saldo_caixa',    label: '(informa\u00e7\u00e3o) Saldo de caixa acumulado' },
  { type: 'info', key: 'estoque',        label: '(informa\u00e7\u00e3o) Estoque em R$' }
];

/* ─── STATE ──────────────────────────────────────────────── */
var isAdmin      = false;
var isEditMode   = false;
var currentMonth = '2026-01';
var allData      = {};
var githubConfig = {};

/* ─── MONTHS ─────────────────────────────────────────────── */
function generateMonths() {
  return [
    '2026-01','2026-02','2026-03','2026-04',
    '2026-05','2026-06','2026-07','2026-08',
    '2026-09','2026-10','2026-11','2026-12'
  ];
}

function formatMonthLabel(key) {
  var parts = key.split('-');
  var y = parts[0];
  var m = parseInt(parts[1], 10);
  var names = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return names[m - 1] + ' ' + y;
}

/* ─── CALCULATIONS ───────────────────────────────────────── */
function calcTotals(d) {
  var receita_bruta   = (d.vendas_diretas || 0) + (d.marketplaces || 0);
  var deducoes        = (d.comissoes || 0) + (d.devolucoes || 0);
  var receita_liquida = receita_bruta - deducoes;
  var lucro_bruto     = receita_liquida - (d.cmv || 0);
  var desp_op         = (d.pessoal || 0) + (d.fixas || 0) + (d.administrativas || 0) + (d.frete_venda || 0);
  var ebitda          = lucro_bruto - desp_op;
  var res_apos_imp    = ebitda - (d.simples || 0);
  var res_liquido     = res_apos_imp - (d.dividendos || 0);
  return {
    receita_bruta:   receita_bruta,
    receita_liquida: receita_liquida,
    lucro_bruto:     lucro_bruto,
    ebitda:          ebitda,
    res_apos_imp:    res_apos_imp,
    res_liquido:     res_liquido
  };
}

/* ─── FORMAT ─────────────────────────────────────────────── */
function fmtBRL(v) {
  if (v === null || v === undefined) return DASH;
  return new Intl.NumberFormat('pt-BR', {
    style: 'currency', currency: 'BRL',
    minimumFractionDigits: 2, maximumFractionDigits: 2
  }).format(v);
}

function fmtPct(val, base) {
  if (!base) return DASH;
  return (val / base * 100).toFixed(1) + '%';
}

function valClass(v) {
  if (v === 0) return 'val-zero';
  return v > 0 ? 'val-positive' : 'val-negative';
}

/* ─── RENDER MONTH NAV ───────────────────────────────────── */
function renderMonthNav() {
  var months = generateMonths();
  var nav    = document.getElementById('month-nav');
  nav.innerHTML = '';

  months.forEach(function(m) {
    var btn = document.createElement('button');
    btn.className   = 'month-tab' + (m === currentMonth ? ' active' : '');
    btn.textContent = formatMonthLabel(m);
    btn.addEventListener('click', function() {
      if (isEditMode) {
        if (!confirm('H\u00e1 edi\u00e7\u00f5es em andamento. Deseja descart\u00e1-las?')) return;
        isEditMode = false;
      }
      currentMonth = m;
      renderAll();
    });
    nav.appendChild(btn);
  });
}

/* ─── RENDER HEADER ──────────────────────────────────────── */
function renderHeaderActions() {
  var el = document.getElementById('header-actions');
  el.innerHTML = '';

  if (isAdmin) {
    var badge = document.createElement('span');
    badge.className   = 'badge-admin';
    badge.textContent = 'Admin';
    el.appendChild(badge);

    if (isEditMode) {
      var btnCancel = document.createElement('button');
      btnCancel.className   = 'btn btn-ghost';
      btnCancel.textContent = 'Cancelar';
      btnCancel.addEventListener('click', cancelEdit);
      el.appendChild(btnCancel);

      var btnSave = document.createElement('button');
      btnSave.className   = 'btn btn-accent';
      btnSave.textContent = 'Salvar';
      btnSave.addEventListener('click', saveData);
      el.appendChild(btnSave);
    } else {
      var btnEdit = document.createElement('button');
      btnEdit.className   = 'btn btn-outline';
      btnEdit.textContent = 'Editar m\u00eas';
      btnEdit.addEventListener('click', startEdit);
      el.appendChild(btnEdit);
    }

    var btnCfg = document.createElement('button');
    btnCfg.className   = 'btn btn-ghost';
    btnCfg.textContent = 'Config GitHub';
    btnCfg.addEventListener('click', function() { openModal('modal-config'); });
    el.appendChild(btnCfg);

    var btnOut = document.createElement('button');
    btnOut.className   = 'btn btn-ghost';
    btnOut.textContent = 'Sair';
    btnOut.addEventListener('click', doLogout);
    el.appendChild(btnOut);
  } else {
    var btnLogin = document.createElement('button');
    btnLogin.className   = 'btn btn-ghost';
    btnLogin.textContent = 'Acesso admin';
    btnLogin.addEventListener('click', function() { openModal('modal-login'); });
    el.appendChild(btnLogin);
  }
}

/* ─── RENDER DRE ─────────────────────────────────────────── */
function emptyMonth() {
  return {
    vendas_diretas: 0, marketplaces: 0, comissoes: 0, devolucoes: 0,
    cmv: 0, pessoal: 0, fixas: 0, administrativas: 0, frete_venda: 0,
    simples: 0, dividendos: 0, saldo_caixa: 0, estoque: 0
  };
}

function renderDRE() {
  var container = document.getElementById('dre-container');
  var data      = allData[currentMonth] || emptyMonth();
  var totals    = calcTotals(data);
  var rb        = totals.receita_bruta;

  container.innerHTML = '';

  var wrapper = document.createElement('div');
  wrapper.className = 'dre-wrapper';

  /* header da tabela */
  var dreHead  = document.createElement('div');
  dreHead.className = 'dre-header';

  var titleSpan = document.createElement('span');
  titleSpan.className   = 'dre-header-title';
  titleSpan.textContent = 'Demonstrativo de Resultado do Exerc\u00edcio';

  var monthSpan = document.createElement('span');
  monthSpan.className   = 'dre-month-label';
  monthSpan.textContent = formatMonthLabel(currentMonth);

  dreHead.appendChild(titleSpan);
  dreHead.appendChild(monthSpan);
  wrapper.appendChild(dreHead);

  /* table */
  var table   = document.createElement('table');
  var thead   = document.createElement('thead');
  var headRow = document.createElement('tr');

  ['Linha DRE', 'Valor (R$)', '% Rec. Bruta'].forEach(function(h, i) {
    var th = document.createElement('th');
    th.textContent = h;
    th.style.width = ['60%','24%','16%'][i];
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  table.appendChild(thead);

  var tbody = document.createElement('tbody');

  DRE_STRUCTURE.forEach(function(row) {
    var tr = document.createElement('tr');

    if (row.type === 'section') {
      tr.className = 'row-section-header';
      var td = document.createElement('td');
      td.setAttribute('colspan', '3');
      td.textContent = row.label;
      tr.appendChild(td);
    }

    else if (row.type === 'divider') {
      tr.className = 'row-section-header';
      var td = document.createElement('td');
      td.setAttribute('colspan', '3');
      td.style.padding = '4px 0';
      tr.appendChild(td);
    }

    else if (row.type === 'sub') {
      tr.className = 'row-sub';
      var val      = data[row.key] !== undefined ? data[row.key] : 0;

      var tdLabel  = document.createElement('td');
      var labelDiv = document.createElement('div');
      labelDiv.className   = 'cell-label';
      labelDiv.textContent = row.label;
      tdLabel.appendChild(labelDiv);
      tr.appendChild(tdLabel);

      if (isEditMode) {
        var tdInp = document.createElement('td');
        tdInp.className = 'cell-input';
        tdInp.setAttribute('colspan', '2');
        var inp = document.createElement('input');
        inp.type          = 'number';
        inp.className     = 'edit-input';
        inp.step          = '0.01';
        inp.dataset.key   = row.key;
        inp.value         = val;
        inp.addEventListener('input', onInputChange);
        tdInp.appendChild(inp);
        tr.appendChild(tdInp);
      } else {
        var tdVal = document.createElement('td');
        tdVal.className   = 'cell-value ' + (val === 0 ? 'val-zero' : 'val-neutral');
        tdVal.textContent = val === 0 ? DASH : fmtBRL(val);
        tr.appendChild(tdVal);

        var tdPct = document.createElement('td');
        tdPct.className   = 'cell-pct';
        tdPct.textContent = (val && rb) ? fmtPct(val, rb) : DASH;
        tr.appendChild(tdPct);
      }
    }

    else if (row.type === 'total') {
      tr.className  = 'row-total';
      var val  = totals[row.id];
      var cls  = row.color === 'positive' ? 'val-positive' : valClass(val);
      var pctT = row.id === 'receita_bruta' ? '100.0%' : (rb ? fmtPct(val, rb) : DASH);

      var tdLabel = document.createElement('td');
      var ld      = document.createElement('div');
      ld.className   = 'cell-label';
      ld.textContent = row.label;
      tdLabel.appendChild(ld);
      tr.appendChild(tdLabel);

      var tdVal = document.createElement('td');
      tdVal.className   = 'cell-value ' + cls;
      tdVal.textContent = fmtBRL(val);
      tr.appendChild(tdVal);

      var tdPct = document.createElement('td');
      tdPct.className   = 'cell-pct';
      tdPct.textContent = pctT;
      tr.appendChild(tdPct);
    }

    else if (row.type === 'total-grand') {
      tr.className = 'row-grand-total';
      var val  = totals[row.id];
      var cls  = valClass(val);
      var pctT = rb ? fmtPct(val, rb) : DASH;

      var tdLabel = document.createElement('td');
      var ld      = document.createElement('div');
      ld.className   = 'cell-label';
      ld.textContent = row.label;
      if (row.showPct && rb) {
        var badge = document.createElement('span');
        badge.style.cssText   = 'color:var(--text-muted);font-size:11px;font-weight:400;margin-left:10px;';
        badge.textContent     = '(' + pctT + ')';
        ld.appendChild(badge);
      }
      tdLabel.appendChild(ld);
      tr.appendChild(tdLabel);

      var tdVal = document.createElement('td');
      tdVal.className   = 'cell-value ' + cls;
      tdVal.textContent = fmtBRL(val);
      tr.appendChild(tdVal);

      var tdPct = document.createElement('td');
      tdPct.className   = 'cell-pct';
      tdPct.textContent = pctT;
      tr.appendChild(tdPct);
    }

    else if (row.type === 'info') {
      tr.className = 'row-info';
      var val      = data[row.key] !== undefined ? data[row.key] : 0;

      var tdLabel  = document.createElement('td');
      var ld       = document.createElement('div');
      ld.className   = 'cell-label';
      ld.textContent = row.label;
      tdLabel.appendChild(ld);
      tr.appendChild(tdLabel);

      if (isEditMode) {
        var tdInp = document.createElement('td');
        tdInp.className = 'cell-input';
        tdInp.setAttribute('colspan', '2');
        var inp = document.createElement('input');
        inp.type        = 'number';
        inp.className   = 'edit-input';
        inp.step        = '0.01';
        inp.dataset.key = row.key;
        inp.value       = val;
        inp.addEventListener('input', onInputChange);
        tdInp.appendChild(inp);
        tr.appendChild(tdInp);
      } else {
        var tdVal = document.createElement('td');
        tdVal.className   = 'cell-value';
        tdVal.textContent = val === 0 ? DASH : fmtBRL(val);
        tr.appendChild(tdVal);

        var tdPct = document.createElement('td');
        tdPct.className   = 'cell-pct';
        tdPct.textContent = DASH;
        tr.appendChild(tdPct);
      }
    }

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  wrapper.appendChild(table);
  container.appendChild(wrapper);
}

function renderAll() {
  renderMonthNav();
  renderHeaderActions();
  renderDRE();
}

/* ─── EDIT ───────────────────────────────────────────────── */
function startEdit() {
  if (!isAdmin) return;
  if (!allData[currentMonth]) allData[currentMonth] = emptyMonth();
  isEditMode = true;
  renderAll();
  setTimeout(function() {
    var first = document.querySelector('.edit-input');
    if (first) first.focus();
  }, 50);
}

function cancelEdit() {
  isEditMode = false;
  renderAll();
}

function onInputChange() {
  var inputs = document.querySelectorAll('.edit-input');
  var draft  = {};
  inputs.forEach(function(inp) {
    draft[inp.dataset.key] = parseFloat(inp.value) || 0;
  });
  var base = Object.assign({}, allData[currentMonth] || emptyMonth(), draft);
  var t    = calcTotals(base);
  var rb   = t.receita_bruta;

  document.querySelectorAll('.row-total, .row-grand-total').forEach(function(tr) {
    var ld = tr.querySelector('.cell-label');
    if (!ld) return;
    var labelText = ld.firstChild ? ld.firstChild.textContent.trim() : ld.textContent.trim();

    DRE_STRUCTURE.forEach(function(row) {
      if (row.type !== 'total' && row.type !== 'total-grand') return;
      if (labelText !== row.label) return;

      var val  = t[row.id];
      var cls  = row.color === 'positive' ? 'val-positive' : valClass(val);
      var pctT = row.id === 'receita_bruta' ? '100.0%' : (rb ? fmtPct(val, rb) : DASH);

      var tdVal = tr.querySelector('.cell-value');
      var tdPct = tr.querySelector('.cell-pct');
      if (tdVal) { tdVal.textContent = fmtBRL(val); tdVal.className = 'cell-value ' + cls; }
      if (tdPct) { tdPct.textContent = pctT; }

      if (row.type === 'total-grand' && row.showPct) {
        var sp = ld.querySelector('span');
        if (sp) sp.textContent = '(' + pctT + ')';
      }
    });
  });
}

/* ─── AUTH ───────────────────────────────────────────────── */
function doLogin() {
  var pwd = document.getElementById('login-password').value;
  if (pwd === ADMIN_PASSWORD) {
    isAdmin = true;
    closeModal('modal-login');
    document.getElementById('login-password').value = '';
    document.getElementById('login-error').textContent = '';
    githubConfig = loadConfig();
    renderAll();
    if (!githubConfig.user || !githubConfig.repo || !githubConfig.pat) {
      setTimeout(function() { openModal('modal-config'); }, 300);
    }
  } else {
    document.getElementById('login-error').textContent = 'Senha incorreta.';
  }
}

function doLogout() {
  if (isEditMode) {
    if (!confirm('H\u00e1 edi\u00e7\u00f5es em andamento. Deseja descartar e sair?')) return;
  }
  isAdmin    = false;
  isEditMode = false;
  renderAll();
}

/* ─── GITHUB CONFIG ──────────────────────────────────────── */
function loadConfig() {
  try { return JSON.parse(localStorage.getItem('dre_gh_config') || '{}'); }
  catch (e) { return {}; }
}

function saveConfig() {
  var user = document.getElementById('cfg-user').value.trim();
  var repo = document.getElementById('cfg-repo').value.trim();
  var pat  = document.getElementById('cfg-pat').value.trim();
  if (!user || !repo || !pat) {
    document.getElementById('config-error').textContent = 'Todos os campos s\u00e3o obrigat\u00f3rios.';
    return;
  }
  githubConfig = { user: user, repo: repo, pat: pat };
  localStorage.setItem('dre_gh_config', JSON.stringify(githubConfig));
  closeModal('modal-config');
  showStatus('Configura\u00e7\u00e3o salva.', 'success');
}

/* ─── LOAD DATA ──────────────────────────────────────────── */
function loadData() {
  githubConfig = loadConfig();
  var rawUrl   = '';

  if (githubConfig.user && githubConfig.repo) {
    rawUrl = 'https://raw.githubusercontent.com/' + githubConfig.user + '/' + githubConfig.repo + '/main/data.json';
  } else {
    var host  = location.hostname;
    var parts = host.split('.');
    if (parts.length >= 3 && parts[1] === 'github') {
      var user     = parts[0];
      var pathname = location.pathname;
      if (pathname.charAt(0) === '/') { pathname = pathname.slice(1); }
      var repo = pathname.split('/')[0] || (user + '.github.io');
      rawUrl   = 'https://raw.githubusercontent.com/' + user + '/' + repo + '/main/data.json';
    } else {
      rawUrl = './data.json';
    }
  }

  return fetch(rawUrl + '?t=' + Date.now())
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(json) { allData = json; })
    .catch(function(e) {
      allData = {};
      console.warn('data.json nao encontrado:', e.message);
    });
}

/* ─── SAVE DATA ──────────────────────────────────────────── */
function saveData() {
  githubConfig = loadConfig();
  if (!githubConfig.user || !githubConfig.repo || !githubConfig.pat) {
    openModal('modal-config');
    return;
  }

  var inputs = document.querySelectorAll('.edit-input');
  if (!allData[currentMonth]) allData[currentMonth] = emptyMonth();
  inputs.forEach(function(inp) {
    allData[currentMonth][inp.dataset.key] = parseFloat(inp.value) || 0;
  });

  showStatus('Salvando...', 'loading');

  var user   = githubConfig.user;
  var repo   = githubConfig.repo;
  var pat    = githubConfig.pat;
  var apiUrl = 'https://api.github.com/repos/' + user + '/' + repo + '/contents/data.json';

  fetch(apiUrl, {
    headers: { 'Authorization': 'token ' + pat, 'Accept': 'application/vnd.github+json' }
  })
  .then(function(res) {
    if (res.ok) return res.json().then(function(d) { return d.sha; });
    if (res.status === 404) return null;
    throw new Error('Erro ao buscar arquivo: ' + res.status);
  })
  .then(function(sha) {
    var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(allData, null, 2))));
    var body    = { message: 'DRE: atualiza ' + currentMonth, content: encoded };
    if (sha) body.sha = sha;
    return fetch(apiUrl, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + pat,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
  })
  .then(function(res) {
    if (!res.ok) {
      return res.json().then(function(err) {
        throw new Error(err.message || 'HTTP ' + res.status);
      });
    }
    isEditMode = false;
    showStatus('Salvo com sucesso no GitHub.', 'success');
    renderAll();
  })
  .catch(function(e) {
    showStatus('Erro ao salvar: ' + e.message, 'error');
    console.error(e);
  });
}

/* ─── MODALS ─────────────────────────────────────────────── */
function openModal(id) {
  document.getElementById(id).style.display = 'flex';
  if (id === 'modal-config') {
    var cfg = loadConfig();
    document.getElementById('cfg-user').value = cfg.user || '';
    document.getElementById('cfg-repo').value = cfg.repo || '';
    document.getElementById('cfg-pat').value  = cfg.pat  || '';
    document.getElementById('config-error').textContent = '';
  }
  if (id === 'modal-login') {
    document.getElementById('login-error').textContent = '';
    setTimeout(function() { document.getElementById('login-password').focus(); }, 50);
  }
}

function closeModal(id) {
  document.getElementById(id).style.display = 'none';
}

document.querySelectorAll('.overlay').forEach(function(ov) {
  ov.addEventListener('click', function(e) {
    if (e.target === ov) closeModal(ov.id);
  });
});

document.getElementById('login-password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

/* ─── STATUS BAR ─────────────────────────────────────────── */
var statusTimer = null;
function showStatus(msg, type) {
  type   = type || 'success';
  var el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className   = 'show ' + type;
  if (statusTimer) clearTimeout(statusTimer);
  if (type !== 'loading') {
    statusTimer = setTimeout(function() { el.className = ''; }, 4000);
  }
}

/* ─── INIT ───────────────────────────────────────────────── */
renderAll();
loadData().then(function() { renderAll(); });
</script>
</body>
</html>
